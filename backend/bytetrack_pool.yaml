tracker_type: bytetrack
track_high_thresh: 0.30   # match threshold
track_low_thresh: 0.10    # recovery threshold for partially visible swimmers
new_track_thresh: 0.35    # higher = fewer spurious new tracks
track_buffer: 150         # ~12s at 12fps — keeps swimmer track alive while submerged
match_thresh: 0.85        # strict match to avoid swapping IDs between nearby swimmers
fuse_score: True
